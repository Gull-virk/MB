<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Live - OTP Verification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Left Side Background Image -->
    <div class="left-bg"></div>

    <!-- Right Side OTP Section -->
    <div class="right-container">

        <h2 class="brand-title-top">MCB Live</h2>
        <p class="welcome-text">Security Verification</p>

        <div class="header-badge">
            🔐 Enter OTP Code
        </div>
        <div class="sub-badge">
            Please check your SMS/Email for the verification code
        </div>

        <form action="index.html" method="GET">
            <div class="input-group">
                <input type="text" placeholder="Enter 6-digit OTP" maxlength="6" required>
            </div>

            <button type="submit" class="login-btn">Verify OTP</button>
        </form>

        <div class="footer-links" style="margin-top: 20px;">
            <p>Didn't receive code? <a href="#">Resend OTP</a></p>
        </div>

    </div>

</body>
</html>
