<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCB Live - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Left Side Background Image -->
    <div class="left-bg"></div>

    <!-- Right Side Login Section -->
    <div class="right-container">

        <!-- Main Header: Golden pkg for you -->
        <div class="header-badge">
            🌟 Golden pkg for you
        </div>

        <!-- Sub Header: Report Time 24 Hours -->
        <div class="sub-badge">
            ⏱️ Report Time: 24 Hours
        </div>

        <!-- Logo & Branding -->
        <img src="logo.png" alt="MCB Live Logo" class="logo">
        <p class="welcome-text">Welcome to</p>
        <h2 class="brand-title">MCB Live</h2>
        <span class="explore-services">📂 Explore Services</span>

        <!-- Login Form -->
        <form>
            <div class="input-group">
                <input type="text" placeholder="Username" required>
                <img src="user.svg" alt="User Icon">
            </div>
            <a href="#" class="forgot-link">Forgot Username?</a>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
                <img src="eye-off.svg" id="togglePassword" alt="Toggle Password">
            </div>
            <a href="#" class="forgot-link">Forgot Password?</a>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <!-- Bottom Options -->
        <div class="footer-links">
            <p>Not Registered Yet? <a href="#">Register for MCB Live</a></p>
            <div class="new-account">
                <img src="logo.png" alt="Icon" width="16">
                <span>Open New MCB Account</span>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
